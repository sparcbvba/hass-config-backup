name: "GitHub Config Backup"
description: "Syncs your Home Assistant configuration to a GitHub repository for backup and version control."
version: "1.0.8"
slug: "github_config_backup"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
map:
  - config:rw
options:
  github_repo: ""
  github_token: ""
  git_name: "Home Assistant"
  git_email: ""
  commit_interval: 3600
  target_paths:
    - "configuration.yaml"
    - "integrations/"
    - "template/"
schema:
  github_repo: str
  github_token: password
  git_name: str
  git_email: str
  commit_interval: int
  target_paths:
    - str